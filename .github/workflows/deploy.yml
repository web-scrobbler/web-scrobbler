name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy-chrome:
    name: Deploy Chrome extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create zipball
        run: npm run dist chrome

      - name: Attach extension to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} web-scrobbler-chrome.zip --clobber

      - name: Publish the extension for Chrome
        uses: trmcnvn/chrome-addon@v2
        with:
          extension: hhinaapppaileiechjoiifaancjggfjm
          zip: web-scrobbler-chrome.zip
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

  deploy-firefox:
    name: Deploy Firefox extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create zipball
        run: npm run dist firefox

      - name: Attach extension to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} web-scrobbler-firefox.zip --clobber

      - name: Publish the extension for Firefox
        uses: inverse/firefox-addon@v0.0.8-alpha
        with:
          api_key: ${{ secrets.AMO_ISSUER }}
          api_secret: ${{ secrets.AMO_SECRET }}
          guid: '{799c0914-748b-41df-a25c-22d008f9e83f}'
          xpi_path: web-scrobbler-firefox.zip
          src_path: web-scrobbler-src.zip
          approval_notes: |
            # Web Scrobbler Version ${{ github.event.release.tag_name }}

            Web Scrobbler is an open-source browser extension that helps users automatically track their music listening history (scrobbling) across hundreds of websites and sync it with services like Last.fm, ListenBrainz, and Maloja.

            ## Reproducibility & Build Instructions

            To build the extension from source and verify its integrity:

            1. **Environment:** Use Node.js (see `.nvmrc` for the exact version).
            2. **System Dependencies (ARM only):** If building on ARM hardware, `pngquant` is required. Install the following packages:
               ```bash
               sudo apt update && sudo apt install -y build-essential pkg-config libimagequant-dev autoconf automake libpng-dev libtool
               ```
            3. **Build Steps:**
               ```bash
               npm ci
               npm run dist firefox
               ```
            4. **Output:** The built extension will be available as `web-scrobbler-firefox.zip` in the root directory or unpacked in `build/firefox`.

            ## Functional Verification

            1. **Installation:** Load the built extension into Firefox (via `about:debugging`).
            2. **Setup:**
               - Click the extension icon and go to **Settings** -> **Accounts**.
               - Authenticate with a **Last.fm** account (free to create).
            3. **Testing:**
               - Navigate to a supported music service (e.g., [YouTube](https://www.youtube.com) or [Spotify Web Player](https://open.spotify.com)).
               - Play a track.
               - The extension icon should change to indicate it's active.
               - Verify that the track appears as "Scrobbling now" on your Last.fm profile.
            4. **Documentation:** See https://web-scrobbler.com for a list of all supported platforms.
          release_notes: ${{ github.event.release.body }}

  deploy-edge:
    name: Deploy Edge extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create zipball
        run: npm run dist chrome

      - name: Get version from package
        run: echo "PACKAGE_VERSION=$(jq .version package.json -r)" >> $GITHUB_ENV

      - name: Publish the extension for Edge
        uses: web-scrobbler/edge-addon@v2.0.4
        with:
          product_id: ${{ secrets.EDGE_PRODUCT_ID }}
          client_id: ${{ secrets.EDGE_CLIENT_ID }}
          api_key: ${{ secrets.EDGE_API_KEY }}
          zip: web-scrobbler-chrome.zip # Compatible with Chrome
          notes: |
            # Web Scrobbler Version ${{ env.PACKAGE_VERSION }}

            Web Scrobbler is an open-source browser extension that helps users automatically track their music listening history (scrobbling) across hundreds of websites and sync it with services like Last.fm, ListenBrainz, and Maloja.

            ## Testing

            To test the extension, please follow these steps:

            1. **Installation:** Load the extension into the browser.
            2. **Setup:**
               - Click the extension icon and go to **Settings** -> **Accounts**.
               - Authenticate with a **Last.fm** account (free to create).
            3. **Testing:**
               - Navigate to a supported music service (e.g., https://www.youtube.com or https://bandcamp.com).
               - Play a track.
               - The extension icon should change to indicate it's active.
               - Verify that the track appears as "Scrobbling now" on your Last.fm profile.

            ## More Information

            Check our website for a list of all supported platforms and more information about the extension: https://web-scrobbler.com
          debug: true
