name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy-chrome:
    name: Deploy Chrome extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create zipball
        run: npm run dist chrome

      - name: Attach extension to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} web-scrobbler-chrome.zip --clobber

      - name: Publish the extension for Chrome
        uses: trmcnvn/chrome-addon@v2
        with:
          extension: hhinaapppaileiechjoiifaancjggfjm
          zip: web-scrobbler-chrome.zip
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

  deploy-firefox:
    name: Deploy Firefox extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create zipball
        run: npm run dist firefox

      - name: Attach extension to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} web-scrobbler-firefox.zip --clobber

      - name: Publish the extension for Firefox
        uses: inverse/firefox-addon@v0.0.7-alpha
        with:
          api_key: ${{ secrets.AMO_ISSUER }}
          api_secret: ${{ secrets.AMO_SECRET }}
          guid: '{799c0914-748b-41df-a25c-22d008f9e83f}'
          xpi_path: web-scrobbler-firefox.zip
          src_path: web-scrobbler-src.zip
          approval_notes: |
            # Version ${{ github.event.release.tag_name }} release upload

            These notes are used to help with the review process to aid with building the extension from source.

            Make sure you use the correct version of node (see `.nvmrc`). Tools such as `nvm`, or `mise` can be used to easily manage node versions.

            ## Arm hardware additional dependencies

            This addon depends on `pngquant` which is required to build from source on arm hardware.

            For this to work you should additionally install `build-essential`, `pkg-config`, `libimagequant-dev` packages on your system.

            ```bash
            sudo apt update && sudo apt install build-essential pkg-config libimagequant-dev
            ```

            ## Building the extension

            After this install node dependencies and build the extension:

            ```bash
            npm ci
            npm run dist firefox
            ```

            Once complete you will find a `web-scrobbler-firefox.zip` file containing the built extension in the root of the repository.

            Alternatively, load the unpacked extension located in the `build/firefox` directory.

  deploy-edge:
    name: Deploy Edge extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create zipball
        run: npm run dist chrome

      - name: Get version from package
        run: echo "PACKAGE_VERSION=$(jq .version package.json -r)" >> $GITHUB_ENV

      - name: Publish the extension for Edge
        uses: web-scrobbler/edge-addon@v2.0.4
        with:
          product_id: ${{ secrets.EDGE_PRODUCT_ID }}
          client_id: ${{ secrets.EDGE_CLIENT_ID }}
          api_key: ${{ secrets.EDGE_API_KEY }}
          zip: web-scrobbler-chrome.zip # Compatible with Chrome
          notes: 'Version ${{ env.PACKAGE_VERSION }} upload'
          debug: true
